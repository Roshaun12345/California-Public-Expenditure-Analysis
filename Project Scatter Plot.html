<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>CA Spending vs Population</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 20px;
      }
      #controls {
        margin: 20px auto;
        width: 1200px;
        text-align: center;
      }
      #scatter-plot {
        margin: 20px auto;
        width: 1200px;
        height: 800px;
      }
      .dot {
        stroke: #fff;
        stroke-width: 1px;
        opacity: 0.8;
      }
      .axis text {
        font-size: 12px;
      }
      .tooltip {
        position: absolute;
        padding: 8px;
        background: rgba(0, 0, 0, 0.9);
        color: white;
        border-radius: 4px;
        pointer-events: none;
        font-size: 12px;
      }
      select {
        padding: 8px;
        font-size: 16px;
        margin-left: 10px;
      }
    </style>
  </head>
  <body>
    <h2>
      California Cities: Avg Spending vs Population
      (2013-2023)
    </h2>
    <div id="controls">
      <label for="region-filter">Filter by Region:</label>
      <select id="region-filter">
        <option value="all">All Regions</option>
      </select>
    </div>
    <div id="scatter-plot"></div>

    <script>
      const svg = d3
        .select('#scatter-plot')
        .append('svg')
        .attr('width', '100%')
        .attr('height', '100%')
        .attr('viewBox', '0 0 1200 800');

      Promise.all([
        d3.csv(
          'https://raw.githubusercontent.com/Roshaun12345/California-Public-Expenditure-Analysis/main/City_Expenditures_Per_Capita.csv',
        ),
        d3.csv(
          'https://raw.githubusercontent.com/Roshaun12345/California-Public-Expenditure-Analysis/main/city_to_region.csv',
        ),
      ]).then(([expData, regionData]) => {
        const regions = d3.rollup(
          regionData,
          (v) => v[0].Region,
          (d) => d['Entity Name'],
        );

        const cities = d3.rollup(
          expData.filter(
            (d) =>
              d['Fiscal Year'] >= 2013 &&
              d['Fiscal Year'] <= 2023,
          ),
          (v) => ({
            pop: d3.mean(
              v,
              (d) => +d['Estimated Population'],
            ),
            spend: d3.mean(
              v,
              (d) => +d['Expenditures Per Capita'],
            ),
            region:
              regions.get(v[0]['Entity Name']) || 'Unknown',
          }),
          (d) => d['Entity Name'],
        );

        const data = Array.from(
          cities,
          ([name, stats]) => ({
            name,
            ...stats,
          }),
        ).filter((d) => d.region !== 'Unknown');

        const uniqueRegions = [
          ...new Set(data.map((d) => d.region)),
        ].sort();

        const regionFilter = d3.select('#region-filter');
        uniqueRegions.forEach((region) => {
          regionFilter
            .append('option')
            .attr('value', region)
            .text(region);
        });

        const xTickValues = [
          0, 400, 800, 4000, 8000, 40000, 80000, 400000,
          800000, 4000000,
        ];
        const xTickPositions = d3
          .range(xTickValues.length)
          .map(
            (i) =>
              100 +
              (i / (xTickValues.length - 1)) * (1100 - 100),
          );

        const yTickValues = [
          0, 800, 1600, 8000, 16000, 80000, 160000, 800000,
          1600000,
        ];
        const yTickPositions = d3
          .range(yTickValues.length)
          .map(
            (i) =>
              700 -
              (i / (yTickValues.length - 1)) * (700 - 100),
          );

        const customXScale = (value) => {
          for (let i = 0; i < xTickValues.length - 1; i++) {
            if (
              value >= xTickValues[i] &&
              value <= xTickValues[i + 1]
            ) {
              const t =
                (value - xTickValues[i]) /
                (xTickValues[i + 1] - xTickValues[i]);
              return (
                xTickPositions[i] +
                t *
                  (xTickPositions[i + 1] -
                    xTickPositions[i])
              );
            }
          }
          return value < xTickValues[0]
            ? xTickPositions[0]
            : xTickPositions[xTickPositions.length - 1];
        };

        const customYScale = (value) => {
          for (let i = 0; i < yTickValues.length - 1; i++) {
            if (
              value >= yTickValues[i] &&
              value <= yTickValues[i + 1]
            ) {
              const t =
                (value - yTickValues[i]) /
                (yTickValues[i + 1] - yTickValues[i]);
              return (
                yTickPositions[i] +
                t *
                  (yTickPositions[i + 1] -
                    yTickPositions[i])
              );
            }
          }
          return value < yTickValues[0]
            ? yTickPositions[0]
            : yTickPositions[yTickPositions.length - 1];
        };

        const xAxis = svg
          .append('g')
          .attr('transform', 'translate(0,700)')
          .attr('class', 'x-axis');

        xAxis
          .selectAll('.tick')
          .data(xTickValues)
          .enter()
          .append('g')
          .attr(
            'transform',
            (d, i) => `translate(${xTickPositions[i]},0)`,
          )
          .call((g) =>
            g
              .append('line')
              .attr('stroke', '#000')
              .attr('y2', 6),
          )
          .call((g) =>
            g
              .append('text')
              .attr('y', 20)
              .attr('dy', '0.35em')
              .attr('text-anchor', 'middle')
              .text((d) => {
                if (d >= 1000000) return `${d / 1000000}M`;
                if (d >= 1000) return `${d / 1000}K`;
                return d;
              }),
          );

        const yAxis = svg
          .append('g')
          .attr('transform', 'translate(100,0)')
          .attr('class', 'y-axis');

        yAxis
          .selectAll('.tick')
          .data(yTickValues)
          .enter()
          .append('g')
          .attr(
            'transform',
            (d, i) => `translate(0,${yTickPositions[i]})`,
          )
          .call((g) =>
            g
              .append('line')
              .attr('stroke', '#000')
              .attr('x2', -6),
          )
          .call((g) =>
            g
              .append('text')
              .attr('x', -10)
              .attr('dy', '0.35em')
              .attr('text-anchor', 'end')
              .text((d) => {
                if (d >= 1000000) return `$${d / 1000000}M`;
                if (d >= 1000) return `$${d / 1000}K`;
                return `$${d}`;
              }),
          );

        svg
          .append('text')
          .attr('x', 600)
          .attr('y', 770)
          .attr('text-anchor', 'middle')
          .text('Average Population (2013-2023)');

        svg
          .append('text')
          .attr('transform', 'rotate(-90)')
          .attr('x', -550)
          .attr('y', 20)
          .attr('text-anchor', 'middle')
          .text('Average Per Capita Spending ($)');

        const color = d3
          .scaleOrdinal(d3.schemeTableau10)
          .domain(uniqueRegions);

        drawChart(data);

        d3.select('#region-filter').on(
          'change',
          function () {
            const selectedRegion = this.value;
            const filteredData =
              selectedRegion === 'all'
                ? data
                : data.filter(
                    (d) => d.region === selectedRegion,
                  );
            drawChart(filteredData);
          },
        );

        function drawChart(chartData) {
          const dots = svg
            .selectAll('circle')
            .data(chartData, (d) => d.name);

          dots.exit().remove();

          dots
            .enter()
            .append('circle')
            .attr('r', 5)
            .attr('fill', (d) => color(d.region))
            .on('mouseover', showTooltip)
            .on('mouseout', hideTooltip)
            .merge(dots)
            .attr('cx', (d) => customXScale(d.pop))
            .attr('cy', (d) => customYScale(d.spend));
        }

        function showTooltip(e, d) {
          d3.select('#tooltip').remove();
          const tooltip = d3
            .select('body')
            .append('div')
            .attr('id', 'tooltip')
            .attr('class', 'tooltip')
            .html(
              `${d.name}<br>${d.region}<br>Pop: ${d3.format(',')(d.pop)}<br>Spend: $${d3.format(',')(d.spend)}`,
            )
            .style('left', `${e.pageX + 10}px`)
            .style('top', `${e.pageY - 28}px`);
        }

        function hideTooltip() {
          d3.select('#tooltip').remove();
        }
      });
    </script>
  </body>
</html>
