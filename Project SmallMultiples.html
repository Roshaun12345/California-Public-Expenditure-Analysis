<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>California Spending Extremes</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 10px;
        display: flex;
        flex-direction: column;
        align-items: center;
        overflow-x: hidden;
      }
      .chart-container {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 20px;
        width: 100%;
        max-width: 1200px;
      }
      .region-chart {
        padding: 10px;
        margin: 0;
        width: 100%;
      }
      .bar {
        fill: #4e79a7;
        transition: fill 0.2s;
      }
      .bar.high {
        fill: #e15759;
      }
      .bar.low {
        fill: #76b7b2;
      }
      .tooltip {
        position: absolute;
        padding: 8px;
        background: rgba(0, 0, 0, 0.8);
        color: white;
        border-radius: 4px;
        pointer-events: none;
        font-size: 12px;
      }
      .loading {
        text-align: center;
        padding: 20px;
        font-size: 16px;
      }
      .axis text {
        font-size: 10px;
      }
      h3 {
        text-align: center;
        margin: 0 0 5px 0;
        font-size: 14px;
      }
      h2 {
        margin: 10px 0 20px 0;
        text-align: center;
        font-size: 18px;
      }
      svg {
        overflow: visible;
      }
    </style>
  </head>
  <body>
    <h2>
      Top 5 & Bottom 5 Cities by Average Per Capita Spending
      (2013-2023)
    </h2>
    <div id="loading" class="loading">Loading data...</div>
    <div id="charts" class="chart-container"></div>

    <script>
      const EXPENDITURE_URL =
        'https://raw.githubusercontent.com/Roshaun12345/California-Public-Expenditure-Analysis/main/City_Expenditures_Per_Capita.csv';
      const REGION_URL =
        'https://raw.githubusercontent.com/Roshaun12345/California-Public-Expenditure-Analysis/main/city_to_region.csv';

      Promise.all([
        d3.csv(EXPENDITURE_URL),
        d3.csv(REGION_URL),
      ])
        .then(([expenditureData, regionData]) => {
          document.getElementById('loading').style.display =
            'none';

          const regionMap = {};
          regionData.forEach((d) => {
            regionMap[d['Entity Name']] = d.Region;
          });

          const cityStats = d3.rollup(
            expenditureData.filter((d) => {
              const year = +d['Fiscal Year'];
              return year >= 2013 && year <= 2023;
            }),
            (v) => {
              const total = d3.sum(
                v,
                (d) => +d['Expenditures Per Capita'],
              );
              return total / v.length;
            },
            (d) => d['Entity Name'],
          );

          const regionGroups = {};
          cityStats.forEach((avg, city) => {
            const region = regionMap[city];
            if (!region) return;

            if (!regionGroups[region]) {
              regionGroups[region] = [];
            }
            regionGroups[region].push({ city, avg });
          });

          const results = {};
          Object.entries(regionGroups).forEach(
            ([region, cities]) => {
              cities.sort((a, b) => b.avg - a.avg);
              results[region] = {
                top: cities.slice(0, 5),
                bottom: cities.slice(-5).reverse(),
              };
            },
          );

          createCharts(results);
        })
        .catch((error) => {
          document.getElementById('loading').textContent =
            'Error loading data. Please check console.';
          console.error('Error:', error);
        });

      function createCharts(regionData) {
        const tooltip = d3
          .select('body')
          .append('div')
          .attr('class', 'tooltip')
          .style('opacity', 0);

        Object.entries(regionData).forEach(
          ([region, data]) => {
            const container = d3
              .select('#charts')
              .append('div')
              .attr('class', 'region-chart');

            container.append('h3').text(region);

            const svg = container
              .append('svg')
              .attr('width', '100%')
              .attr('height', '450')
              .attr('viewBox', '0 0 550 450');

            const chartData = [
              ...data.top.map((d) => ({
                ...d,
                type: 'high',
              })),
              ...data.bottom.map((d) => ({
                ...d,
                type: 'low',
              })),
            ];

            const y = d3
              .scaleBand()
              .domain(chartData.map((d) => d.city))
              .range([400, 50])
              .padding(0.3);

            const maxVal = d3.max(chartData, (d) => d.avg);
            const minVal = d3.min(chartData, (d) => d.avg);
            const padding = Math.max(maxVal * 0.1, 50);

            const x = d3
              .scaleLinear()
              .domain([0, maxVal + padding])
              .range([80, 500])
              .nice();

            svg
              .selectAll('.bar')
              .data(chartData)
              .enter()
              .append('rect')
              .attr('class', (d) => `bar ${d.type}`)
              .attr('y', (d) => y(d.city))
              .attr('x', x(0))
              .attr('width', (d) => x(d.avg) - x(0))
              .attr('height', y.bandwidth())
              .on('mouseover', function (event, d) {
                d3.select(this).attr('opacity', 0.8);
                tooltip
                  .html(
                    `${d.city}<br>Avg: $${d.avg.toFixed(2)}`,
                  )
                  .style('opacity', 1)
                  .style('left', event.pageX + 10 + 'px')
                  .style('top', event.pageY - 28 + 'px');
              })
              .on('mouseout', function () {
                d3.select(this).attr('opacity', 1);
                tooltip.style('opacity', 0);
              });

            svg
              .append('g')
              .attr('class', 'axis')
              .attr('transform', 'translate(80,0)')
              .call(d3.axisLeft(y));

            svg
              .append('g')
              .attr('class', 'axis')
              .attr('transform', 'translate(0,400)')
              .call(
                d3
                  .axisBottom(x)
                  .ticks(6)
                  .tickFormat(
                    (d) => `$${d3.format(',.0f')(d)}`,
                  ),
              )
              .selectAll('text')
              .attr('transform', 'rotate(-30)')
              .style('text-anchor', 'end')
              .attr('dx', '-0.5em')
              .attr('dy', '0.5em');

            const legend = svg
              .append('g')
              .attr('transform', 'translate(400,20)');

            legend
              .append('rect')
              .attr('x', 0)
              .attr('y', 0)
              .attr('width', 12)
              .attr('height', 12)
              .attr('fill', '#e15759');

            legend
              .append('text')
              .attr('x', 18)
              .attr('y', 10)
              .text('Top 5')
              .style('font-size', '10px');

            legend
              .append('rect')
              .attr('x', 80)
              .attr('y', 0)
              .attr('width', 12)
              .attr('height', 12)
              .attr('fill', '#76b7b2');

            legend
              .append('text')
              .attr('x', 98)
              .attr('y', 10)
              .text('Bottom 5')
              .style('font-size', '10px');
          },
        );
      }
    </script>
  </body>
</html>
